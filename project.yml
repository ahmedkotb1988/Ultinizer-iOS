name: Ultinizer
options:
  bundleIdPrefix: com.ultinizer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Ultinizer:
    type: application
    platform: iOS
    sources:
      - path: Ultinizer
        excludes:
          - Tests
    resources:
      - path: Ultinizer/Resources
    settings:
      base:
        INFOPLIST_FILE: Ultinizer/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ultinizer.app
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
    info:
      path: Ultinizer/Resources/Info.plist
      properties:
        CFBundleDisplayName: Ultinizer
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSFaceIDUsageDescription: "Ultinizer uses Face ID to securely unlock your account without entering your password."
        NSCameraUsageDescription: "Ultinizer needs access to your camera to take photos for task attachments and comments."
        NSPhotoLibraryUsageDescription: "Ultinizer needs access to your photo library to attach images to tasks and comments."
        UIUserInterfaceStyle: Light
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf

  UltinizerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Ultinizer/Tests
    dependencies:
      - target: Ultinizer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ultinizer.app.tests
